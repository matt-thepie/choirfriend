services:
  postgres:
    image: postgres:17-alpine
    container_name: choirfriend-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: choirfriend
      POSTGRES_PASSWORD: choirfriend
      POSTGRES_DB: choirfriend
    ports:
      - "5432:5432"
    volumes:
      - choirfriend_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U choirfriend"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  choirfriend_pgdata:
